[build-system]
requires = ["setupt>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hotblaz"
version = "0.1.0"
description = "Hotblaz vector processing package"
requires-python = ">=3.10,<3.11"  # 严格匹配你的 3.10.9
keywords = ["hotblaz", "vector", "nlp", "torch"]
authors = [
  { name="your-name", email="your-email@example.com" }
]

dependencies = [
  "numpy==2.4.3",
  "pandas==3.0.1",
  "PyYAML==6.0.3",
  "requests==2.32.5",
  "torch==2.5.1",
  "transformers==5.1.0",
]
[
build-system
]
requires = ["setuptools>=61.0"]  # 👈 修复：setupt 改成 setuptools
build-backend = "setuptools.build_meta"

[
project
]
name = "hotblaz"
version = "0.1.1"
  { name="Mark_Leaou", email="mark.leaou@outlook.cn" }
long_description = file: README.md
long_description_content_type = "text/markdown"
requires-python = ">=3.10,<3.11"
keywords = ["hotblaz", "vector", "nlp", "torch"]
authors = [
  { name="butereleaou-pixel", email="betereleaou@gmail.com" }
]

dependencies = [
  "numpy==2.4.3",
  "pandas==3.0.1",
  "PyYAML==6.0.3",
  "requests==2.32.5",
  "torch==2.5.1",
  "transformers==5.1.0",
]